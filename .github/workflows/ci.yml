name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v3.14.1
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run backend lint (Checkstyle)
        run: |
          cd backend
          mvn checkstyle:check

  backend:
    runs-on: ubuntu-latest
    environment: production
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Clean Maven cache
        run: |
          rm -rf ~/.m2/repository
          rm -rf backend/target

      - name: Set up JDK 21
        uses: actions/setup-java@v3.14.1
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      # - name: Format code with Google Java Format ✨
      #   uses: axel-op/googlejavaformat-action@v3
      #   with:
      #     args: --set-exit-if-changed
      #     files: backend/**/*.java

      - name: Verify with maven and generate coverage report
        env:
          TEST_TURNSTILE_SECRET_KEY: ${{ secrets.TEST_TURNSTILE_SECRET_KEY }}
        run: |
          cd backend
          touch .env
          mvn -Dspring.profiles.active=test clean verify jacoco:report

      - name: Upload JaCoCo coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/
          retention-days: 7

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v3.9.1
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: "10.8.0"

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run frontend lint
        run: |
          cd frontend
          rm cypress.config.d.ts
          rm vitest.config.d.ts
          pnpm exec eslint . --max-warnings=0

  frontend:
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Clean frontend artifacts
        run: |
          rm -rf frontend/node_modules
          rm -rf frontend/dist

      - name: Set up Node.js
        uses: actions/setup-node@v3.9.1
        with:
          node-version: "22"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: "10.8.0"

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --force --no-cache

      - name: Build frontend
        run: |
          cd frontend
          pnpm run build

      - name: Run tests
        run: |
          cd frontend
          pnpm run test:a11y
          pnpm run test:coverage

      - name: Upload frontend coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v3.9.1
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: "10.8.0"

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run Cypress E2E tests
        run: |
          cd frontend
          pnpm run test:e2e
