<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekreft e-postadresse</title>
  <style>
    body {
      background-color: #f9fafb;
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      padding: 0;
    }
    .header {
      font-size: 22px;
      font-weight: bold;
      color: #1E3A8A;
      text-align: center;
      padding: 30px 0 10px 0;
    }
    .content {
      font-size: 16px;
      color: #374151;
      padding: 0 25px 10px 25px;
    }
    .button-container {
      text-align: center;
      padding: 15px 0;
    }
    .button {
      display: inline-block;
      background: #1E3A8A;
      color: #fff;
      font-size: 16px;
      padding: 10px 25px;
      border-radius: 5px;
      text-decoration: none;
      margin: 0 auto;
    }
    .fallback {
      font-size: 14px;
      color: #6B7280;
      padding: 0 25px 10px 25px;
    }
    .footer {
      font-size: 12px;
      color: #9CA3AF;
      padding: 0 25px 20px 25px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Bekreft e-postadresse</div>
    <div class="content">
      Hei {{name}},<br><br>
      Takk for at du registrerte deg! Vennligst bekreft e-postadressen din ved å trykke på knappen under:
    </div>
    <div class="button-container">
      <a href="{{link}}" class="button" target="_blank">Bekreft e-post</a>
    </div>
    <div class="fallback">
      Hvis knappen ikke fungerer, kopier og lim inn lenken i nettleseren:<br>
      <a href="{{link}}" style="color:#1E3A8A;">{{link}}</a>
    </div>
    <div class="footer">
      Vennlig hilsen,<br>Teamet
    </div>
  </div>
</body>
</html>
