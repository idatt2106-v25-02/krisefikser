services:
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - '${FRONTEND_PORT:-80}:80'
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - VITE_FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
        profiles:
            - ${PROFILE:-production}

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - '${BACKEND_PORT:-8080}:8080'
        environment:
            - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-${SPRING_PROFILE:-dev}}
            - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/krisefikser
            - SPRING_DATASOURCE_USERNAME=root
            - SPRING_DATASOURCE_PASSWORD=root
            - AUTH_ADMIN_TWO_FACTOR_ENABLED=${AUTH_ADMIN_TWO_FACTOR_ENABLED:-true}
            - FRONTEND_URL=${FRONTEND_URL:-http://127.0.0.1:5173}
            - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
            - E2E_MAIL_HOOK_SECRET=${E2E_MAIL_HOOK_SECRET:-}
        depends_on:
            db:
                condition: service_healthy
        profiles:
            - ${PROFILE:-production}
    db:
        image: mysql:lts
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: krisefikser
        ports:
            - '3306:3306'
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    'localhost',
                    '-u',
                    'root',
                    '-proot',
                ]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    mysql_data:
